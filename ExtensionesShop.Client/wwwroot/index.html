<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Extensiones Shop — Extensiones de cabello natural 100% Remy. Tu Cabello, Tu Poder." />
    <meta name="theme-color" content="#E8607A" />

    <!-- Open Graph -->
    <meta property="og:title" content="Extensiones Shop" />
    <meta property="og:description" content="Tu Cabello, Tu Poder. Extensiones naturales Remy de calidad premium." />
    <meta property="og:type" content="website" />

    <title>Extensiones Shop</title>

    <!-- Favicon placeholder -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- App CSS -->
    <link href="css/app.css" rel="stylesheet" />
    <link href="css/shared-forms.css" rel="stylesheet" />

    <!-- Blazor component styles -->
    <link href="ExtensionesShop.Client.styles.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <!-- Loading splash -->
        <div id="loading-splash" style="
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: #fff; z-index: 9999;
            flex-direction: column; gap: 16px;
            font-family: 'DM Sans', sans-serif;">
            <div style="font-size: 32px; animation: spin 2s linear infinite; display: inline-block;">✦</div>
            <p style="font-size: 13px; color: #9B8890; letter-spacing: .1em;">CARGANDO...</p>
        </div>
        <style>
            @keyframes spin { to { transform: rotate(360deg); } }
        </style>
    </div>

    <div id="blazor-error-ui">
        Ha ocurrido un error inesperado.
        <a href="" class="reload">Recargar</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmqoXqKp9tBBMnGkgMmAvOJ4HqwP"
            crossorigin="anonymous"></script>

    <!-- Scroll detection for sticky header -->
    <script>
        window.initScrollDetection = function () {
            const header = document.querySelector('.site-header');
            if (!header) return;
            const observer = new IntersectionObserver(
                ([entry]) => header.classList.toggle('scrolled', !entry.isIntersecting),
                { threshold: 0 }
            );
            const sentinel = document.createElement('div');
            sentinel.style.cssText = 'position:absolute;top:1px;left:0;width:1px;height:1px;';
            document.body.prepend(sentinel);
            observer.observe(sentinel);
        };
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
